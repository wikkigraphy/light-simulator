<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <radialGradient id="skin" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8865a"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="450" fill="url(#bg)" rx="8"/>
  <!-- Body/Shoulders -->
  <ellipse cx="150" cy="380" rx="120" ry="80" fill="#333"/>
  <ellipse cx="150" cy="370" rx="100" ry="65" fill="#3a3a3a"/>
  <!-- Neck -->
  <rect x="125" y="235" width="50" height="50" rx="8" fill="url(#skin)"/>
  <!-- Head -->
  <ellipse cx="150" cy="190" rx="65" ry="80" fill="url(#skin)"/>
  <!-- Hair -->
  <ellipse cx="150" cy="140" rx="70" ry="50" fill="#2c1810"/>
  <ellipse cx="108" cy="170" rx="25" ry="55" fill="#2c1810"/>
  <ellipse cx="192" cy="170" rx="25" ry="55" fill="#2c1810"/>
  <!-- Eyes -->
  <ellipse cx="130" cy="195" rx="10" ry="7" fill="#fff"/>
  <ellipse cx="170" cy="195" rx="10" ry="7" fill="#fff"/>
  <circle cx="132" cy="195" r="4" fill="#3a2510"/>
  <circle cx="172" cy="195" r="4" fill="#3a2510"/>
  <circle cx="133" cy="194" r="1.5" fill="#fff"/>
  <circle cx="173" cy="194" r="1.5" fill="#fff"/>
  <!-- Eyebrows -->
  <path d="M118 183 Q130 178 142 183" fill="none" stroke="#2c1810" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M158 183 Q170 178 182 183" fill="none" stroke="#2c1810" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M150 200 L145 220 Q150 224 155 220 Z" fill="#c49460" opacity="0.5"/>
  <!-- Mouth -->
  <path d="M135 238 Q150 248 165 238" fill="none" stroke="#a06040" stroke-width="2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="150" y="430" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="11">Upload your photo to replace</text>
</svg>
