<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <radialGradient id="skinBase" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e8c4a0"/>
      <stop offset="60%" stop-color="#d4a87a"/>
      <stop offset="100%" stop-color="#bc8e60"/>
    </radialGradient>
    <radialGradient id="skinCheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8b8a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8b8a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e06"/>
      <stop offset="50%" stop-color="#2c1a0e"/>
      <stop offset="100%" stop-color="#1a0e06"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="eyeWhite" cx="45%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e8e4e0"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6b4e2f"/>
      <stop offset="60%" stop-color="#3d2b18"/>
      <stop offset="100%" stop-color="#2a1a0c"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="shadow"/>
      <feFlood flood-color="#000" flood-opacity="0.15"/>
      <feComposite in2="shadow" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shoulders / Shirt -->
  <path d="M60,560 Q60,440 130,400 Q160,385 200,380 Q240,385 270,400 Q340,440 340,560 Z"
        fill="url(#shirtGrad)"/>
  <path d="M120,420 Q150,410 200,405 Q250,410 280,420 L270,400 Q240,385 200,380 Q160,385 130,400 Z"
        fill="#333" opacity="0.5"/>
  <!-- Collar detail -->
  <path d="M155,400 L175,420 L200,410 L225,420 L245,400"
        fill="none" stroke="#444" stroke-width="1.5"/>

  <!-- Neck -->
  <path d="M170,380 Q170,340 175,320 L225,320 Q230,340 230,380 Q215,388 200,390 Q185,388 170,380 Z"
        fill="url(#skinBase)" filter="url(#softShadow)"/>
  <ellipse cx="200" cy="350" rx="8" ry="3" fill="#c49060" opacity="0.15"/>

  <!-- Head -->
  <ellipse cx="200" cy="230" rx="80" ry="100" fill="url(#skinBase)" filter="url(#softShadow)"/>

  <!-- Ear left -->
  <ellipse cx="118" cy="240" rx="12" ry="20" fill="#d4a87a"/>
  <ellipse cx="120" cy="240" rx="7" ry="14" fill="#c49870" opacity="0.5"/>
  <!-- Ear right -->
  <ellipse cx="282" cy="240" rx="12" ry="20" fill="#d4a87a"/>
  <ellipse cx="280" cy="240" rx="7" ry="14" fill="#c49870" opacity="0.5"/>

  <!-- Hair -->
  <path d="M120,210 Q120,130 160,110 Q180,100 200,98 Q220,100 240,110 Q280,130 280,210 Q260,170 200,160 Q140,170 120,210 Z"
        fill="url(#hairGrad)"/>
  <path d="M118,210 Q115,180 120,150 Q110,170 108,210 Q110,250 118,270 Z"
        fill="url(#hairGrad)"/>
  <path d="M282,210 Q285,180 280,150 Q290,170 292,210 Q290,250 282,270 Z"
        fill="url(#hairGrad)"/>
  <path d="M130,145 Q165,125 200,120 Q235,125 270,145 Q245,115 200,108 Q155,115 130,145 Z"
        fill="#120a04" opacity="0.6"/>

  <!-- Forehead shadow -->
  <ellipse cx="200" cy="190" rx="65" ry="15" fill="#c49870" opacity="0.08"/>

  <!-- Eyebrows -->
  <path d="M150,210 Q165,202 182,208" fill="none" stroke="#2c1810" stroke-width="3" stroke-linecap="round"/>
  <path d="M218,208 Q235,202 250,210" fill="none" stroke="#2c1810" stroke-width="3" stroke-linecap="round"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="166" cy="228" rx="16" ry="10" fill="url(#eyeWhite)"/>
  <circle cx="168" cy="228" r="7" fill="url(#irisGrad)"/>
  <circle cx="168" cy="228" r="3.5" fill="#0a0804"/>
  <circle cx="171" cy="225" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="165" cy="231" r="1" fill="#fff" opacity="0.4"/>
  <path d="M150,228 Q158,218 182,228" fill="none" stroke="#2c1810" stroke-width="1.2"/>
  <path d="M150,228 Q158,236 182,228" fill="none" stroke="#c4a080" stroke-width="0.8" opacity="0.5"/>

  <!-- Right eye -->
  <ellipse cx="234" cy="228" rx="16" ry="10" fill="url(#eyeWhite)"/>
  <circle cx="232" cy="228" r="7" fill="url(#irisGrad)"/>
  <circle cx="232" cy="228" r="3.5" fill="#0a0804"/>
  <circle cx="235" cy="225" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="229" cy="231" r="1" fill="#fff" opacity="0.4"/>
  <path d="M218,228 Q226,218 250,228" fill="none" stroke="#2c1810" stroke-width="1.2"/>
  <path d="M218,228 Q226,236 250,228" fill="none" stroke="#c4a080" stroke-width="0.8" opacity="0.5"/>

  <!-- Nose -->
  <path d="M200,238 L196,264 Q198,268 200,268 Q202,268 204,264 Z"
        fill="#c49870" opacity="0.25"/>
  <path d="M192,266 Q196,272 200,272 Q204,272 208,266"
        fill="none" stroke="#b08060" stroke-width="1.2" opacity="0.4"/>
  <!-- Nostrils -->
  <circle cx="194" cy="267" r="2.5" fill="#a07050" opacity="0.3"/>
  <circle cx="206" cy="267" r="2.5" fill="#a07050" opacity="0.3"/>

  <!-- Cheek highlights -->
  <ellipse cx="155" cy="255" rx="20" ry="15" fill="url(#skinCheek)"/>
  <ellipse cx="245" cy="255" rx="20" ry="15" fill="url(#skinCheek)"/>

  <!-- Nasolabial folds -->
  <path d="M183,268 Q180,280 178,290" fill="none" stroke="#c09070" stroke-width="0.6" opacity="0.3"/>
  <path d="M217,268 Q220,280 222,290" fill="none" stroke="#c09070" stroke-width="0.6" opacity="0.3"/>

  <!-- Mouth -->
  <path d="M178,296 Q188,290 200,288 Q212,290 222,296"
        fill="#c47060" opacity="0.6"/>
  <path d="M178,296 Q190,304 200,305 Q210,304 222,296"
        fill="#b05848" opacity="0.5"/>
  <path d="M178,296 Q190,297 200,298 Q210,297 222,296"
        fill="none" stroke="#a04838" stroke-width="0.8" opacity="0.4"/>

  <!-- Chin shadow -->
  <ellipse cx="200" cy="325" rx="30" ry="8" fill="#b08060" opacity="0.1"/>

  <!-- Jaw line definition -->
  <path d="M130,270 Q140,310 170,330 Q185,338 200,340 Q215,338 230,330 Q260,310 270,270"
        fill="none" stroke="#c49870" stroke-width="0.5" opacity="0.15"/>

  <!-- Subtle neck shadow -->
  <ellipse cx="200" cy="345" rx="35" ry="6" fill="#a07850" opacity="0.15"/>

  <!-- Upload instruction -->
  <text x="200" y="540" text-anchor="middle" fill="#555" font-family="'Inter', sans-serif" font-size="12" font-weight="400">Upload your photo to replace</text>
</svg>
