name: Scheduled Verification

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  weekly-verify:
    name: Weekly Full Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --help

      - name: Run make update
        run: make update

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: weekly-coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 30

  weekly-docker:
    name: Weekly Docker Build
    runs-on: ubuntu-latest
    needs: weekly-verify
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t light-simulator:weekly-${{ github.run_id }} .

      - name: Verify Docker image starts
        run: |
          docker run -d --name test-server -p 8080:8080 light-simulator:weekly-${{ github.run_id }}
          sleep 3
          curl -sf http://localhost:8080/api/health || exit 1
          docker stop test-server
          docker rm test-server

  weekly-security:
    name: Weekly Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check for known vulnerabilities
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Verify no committed secrets
        run: |
          if git log --all --diff-filter=A --name-only --pretty=format: | grep -iE '\.(env|pem|key|crt|p12|pfx)$'; then
            echo "::warning::Potential secret files detected in git history"
          fi
