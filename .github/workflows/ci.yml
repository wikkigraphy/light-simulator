name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  update:
    name: Verify (make update)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --help

      - name: Run make update
        run: make update

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 14

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: update
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t light-simulator:${{ github.sha }} .

      - name: Smoke test Docker image
        run: |
          docker run -d --name ci-smoke -p 8080:8080 light-simulator:${{ github.sha }}
          sleep 3
          curl -sf http://localhost:8080/api/health || exit 1
          docker stop ci-smoke
          docker rm ci-smoke
